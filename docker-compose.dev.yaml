services:
  # -------------------------
  # 1) Database
  # ------------------------- 
  postgres:
    image: postgres:16
    container_name: court_db_dev
    restart: always
    environment:
      POSTGRES_USER: jonah
      POSTGRES_PASSWORD: jonah
      POSTGRES_DB: courtdb_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jonah -d courtdb_dev"]
      interval: 5s
      retries: 10

  # -------------------------
  # 2) FastAPI Backend
  # -------------------------
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jonah:jonah@postgres:5432/courtdb_dev
      BOT_TOKEN: ${BOT_TOKEN}
    ports:
      - "8000:8000"

  # -------------------------
  # 3) Python court scraper
  # ------------------------
  scraper:
    build:
      context: ./court_scraper_service
      dockerfile: Dockerfile
    env_file:
      - ./court_scraper_service/.env.dev
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
   # volumes:
   #   - ./court_scraper_service:/app


volumes:
  pgdata:

